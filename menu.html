<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crumble Local | Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body data-page="menu">
  <nav class="navbar navbar-expand-lg sticky-top app-navbar">
    <div class="container">
      <a class="navbar-brand brand-mark" href="../index.html">Crumble Local</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menuNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link active" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="locations.html">Ubicaciones</a></li>
          <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
          <li class="nav-item"><a class="btn btn-dark rounded-pill px-4" href="cart.html">Carrito <span class="badge text-bg-light ms-2" id="cartCountBadge">0</span></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="section-space">
    <div class="container">
      <div class="page-hero mb-4">
        <span class="eyebrow">Build your box</span>
        <h1>Menu y catalogo</h1>
        <p>Filtra, busca y agrega productos directamente al carrito.</p>
      </div>
      <div class="catalog-toolbar mb-4">
        <div class="row g-3 align-items-center">
          <div class="col-lg-5">
            <input type="search" class="form-control form-control-lg" id="searchInput" placeholder="Buscar por nombre...">
          </div>
          <div class="col-lg-7">
            <div class="d-flex flex-wrap gap-2">
              <button class="btn btn-filter active" data-filter="all">Todos</button>
              <button class="btn btn-filter" data-filter="weekly">Semanales</button>
              <button class="btn btn-filter" data-filter="classic">Clasicos</button>
              <button class="btn btn-filter" data-filter="premium">Premium</button>
              <button class="btn btn-filter" data-filter="drink">Bebidas</button>
            </div>
          </div>
        </div>
      </div>
      <div class="row g-4" id="menuProducts"></div>
    </div>
  </main>

  <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-body p-0" id="productModalContent"></div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/data/seed.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/cart.js"></script>
  <script src="../assets/js/products.js"></script>
</body>
</html>
