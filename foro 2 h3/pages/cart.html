<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crumble Local | Carrito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body data-page="cart">
  <nav class="navbar navbar-expand-lg sticky-top app-navbar">
    <div class="container">
      <a class="navbar-brand brand-mark" href="../index.html">Crumble Local</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#cartNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="cartNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="locations.html">Ubicaciones</a></li>
          <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
          <li class="nav-item"><a class="btn btn-dark rounded-pill px-4" href="cart.html">Carrito <span class="badge text-bg-light ms-2" id="cartCountBadge">0</span></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="section-space">
    <div class="container">
      <div class="page-hero mb-4">
        <span class="eyebrow">Checkout local</span>
        <h1>Tu carrito</h1>
        <p>Revisa tu pedido, ajusta cantidades y completa la compra simulada.</p>
      </div>
      <div class="row g-4">
        <div class="col-lg-7">
          <div class="panel-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="h4 mb-0">Productos seleccionados</h2>
              <button class="btn btn-outline-danger btn-sm" id="clearCartBtn" type="button">Vaciar carrito</button>
            </div>
            <div id="cartItemsContainer"></div>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="panel-card mb-4">
            <h2 class="h4 mb-3">Resumen</h2>
            <div class="summary-row"><span>Subtotal</span><strong id="subtotalValue">$0.00</strong></div>
            <div class="summary-row"><span>Envio</span><strong>$0.00</strong></div>
            <div class="summary-row total"><span>Total</span><strong id="totalValue">$0.00</strong></div>
          </div>
          <div class="panel-card">
            <h2 class="h4 mb-3">Finalizar pedido</h2>
            <form id="checkoutForm" novalidate>
              <div class="mb-3">
                <label for="customerName" class="form-label">Nombre completo</label>
                <input id="customerName" class="form-control" required>
              </div>
              <div class="mb-3">
                <label for="phone" class="form-label">Telefono</label>
                <input id="phone" class="form-control" required>
              </div>
              <div class="mb-3">
                <label for="deliveryType" class="form-label">Tipo de entrega</label>
                <select id="deliveryType" class="form-select">
                  <option value="pickup">Retiro en sucursal</option>
                  <option value="delivery">Delivery</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="storeId" class="form-label">Sucursal</label>
                <select id="storeId" class="form-select"></select>
              </div>
              <div class="mb-3" id="addressGroup">
                <label for="address" class="form-label">Direccion</label>
                <input id="address" class="form-control" placeholder="Solo si eliges delivery">
              </div>
              <div class="mb-3">
                <label for="notes" class="form-label">Observaciones</label>
                <textarea id="notes" rows="3" class="form-control"></textarea>
              </div>
              <button class="btn btn-dark w-100 rounded-pill py-3" type="submit">Confirmar pedido</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/data/seed.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/cart.js"></script>
  <script src="../assets/js/checkout.js"></script>
</body>
</html>
